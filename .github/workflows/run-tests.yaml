name: Run Hayabusa Tests

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      hayabusa-branch:
        description: 'Branch to test against'
        required: true
        default: 'release/hayabusa'
  workflow_call:
    inputs:
      hayabusa-branch:
        type: string
        required: false
      codebuild-name:
        type: string
        required: false
        default: codebuild-Hayabusa-E2E

permissions:
  contents: read

jobs:
  run-tests:
    runs-on:
      - ${{ inputs.codebuild-name || 'codebuild-Hayabusa-E2E' }}-${{ github.run_id }}-${{ github.run_attempt }}
      - image:arm-3.0
      - instance-size:large # xlarge=32 vCPUs, 64 GiB memory, large=8 vCPUs, 16 GiB memory

    strategy:
      matrix:
        packages:
          - builtins
          - tests/validations
          - tests/delegations
          - tests/energy
      fail-fast: false

    env:
      GOPRIVATE: github.com/vechain/draupnir/*

    steps:
      - name: Checkout E2E
        uses: actions/checkout@v4
        with:
          repository: vechain/hayabusa-e2e
          path: hayabusa-e2e
          token: ${{ secrets.GHA_REPO_ACCESS }}

      - name: Checkout Hayabusa
        uses: actions/checkout@v4
        with:
          repository: vechain/hayabusa
          path: hayabusa
          token: ${{ secrets.GHA_REPO_ACCESS }}
          ref: ${{ inputs.hayabusa-branch }}

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.24.x

      - name: Configure git for private modules
        run: |
          git config --global url."https://${{ secrets.GHA_REPO_ACCESS }}@github.com/".insteadOf "https://github.com/"

      - name: Test
        run: go test -v -failfast -timeout 3600s ./${{ matrix.packages }}
        working-directory: ${{ github.workspace }}/hayabusa-e2e
        env:
          THOR_WORKING_DIR: ${{ github.workspace }}/hayabusa
