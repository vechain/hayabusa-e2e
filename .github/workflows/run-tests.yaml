name: Run Hayabusa Tests

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  run-tests:
    runs-on: ubuntu-latest

    env:
      GOPRIVATE: github.com/vechain/draupnir/*

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          repository: '${{ github.repository }}'
          path: hayabusa-e2e

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          repository: vechain/hayabusa
          path: hayabusa
          token: ${{ secrets.GHA_REPO_ACCESS }}

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.24.x

      - name: Configure git for private modules
        run: |
          git config --global url."https://${{ secrets.GHA_REPO_ACCESS }}@github.com/".insteadOf "https://github.com/"

      - name: Test
        run: go test ./...
        env:
          THOR_WORKING_DIR: ${{ github.workspace }}/hayabusa
